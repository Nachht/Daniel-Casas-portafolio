<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daniel | Portafolio</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Fondo -->
    <div class="fondo"></div>
    <div class="capa-color"></div>

    <!-- NavBar-->
    <header class="barra-navegacion">
        <div class="contenedor-navegacion">
            <div class="logo">
                Daniel
            </div>

            <nav>
                <ul class="menu">
                    <li><a href="#inicio">Inicio</a></li>
                    <li><a href="#sobre-mi">Sobre mí</a></li>
                    <li><a href="#cv">CV</a></li>
                    <li><a href="#proyectos">Proyectos</a></li>
                    <li><a href="#tecnologias">Tecnologías</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <main class="inicio" id="inicio">
        <section class="hero">
            <div class="columna-izquierda">
                <div class="contenedor-luna">
                    <img src="img/Luna2.png" class="luna" alt="Luna">
                </div>
            </div>
            <div class="columna-derecha">
                <div class="informacion">
                    <p class="saludo">
                        Hola, mi nombre es
                    </p>
                    <h1>Daniel Casas</h1>
                    <h2>Ingeniero de Sistemas</h2>
                    <p class="descripcion">
                        Desarrollo aplicaciones Full Stack utilizando
                        Java, Spring Boot, MySQL y tecnologías web modernas.
                    </p>
                    <div class="botones">
                        <a href="#proyectos" class="boton boton-principal">
                            Ver proyectos
                        </a>
                        <a href="#contacto" class="boton boton-secundario">
                            Contacto
                        </a>
                    </div>
                    <div class="redes-sociales">
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                        <a href="#"><i class="fa-solid fa-envelope"></i></a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Indicador -->
        <div class="indicador-scroll">
            <span></span>
        </div>
    </main>
    <script src="script.js"></script>

</body>

</html>
